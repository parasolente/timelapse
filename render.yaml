services:
  - type: web
    name: timelapse
    runtime: docker
    repo: https://github.com/parasolente/timelapse
    plan: free
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://timelapse.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: timelapse-db
          property: connectionString

databases:
  - name: timelapse-db
    plan: free
    region: oregon
